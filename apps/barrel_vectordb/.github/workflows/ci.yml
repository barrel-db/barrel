name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/barrel_vectordb/barrel_vectordb

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake libsnappy-dev liblz4-dev libzstd-dev python3 python3-pip python3-venv python3-dev

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ hashFiles('priv/requirements.txt') }}

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install sentence-transformers

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        env:
          BARREL_PYTHON: .venv/bin/python
        run: |
          # Core tests
          rebar3 eunit --module=barrel_vectordb_tests
          rebar3 eunit --module=barrel_vectordb_store_tests
          rebar3 eunit --module=barrel_vectordb_hnsw_tests
          rebar3 eunit --module=barrel_vectordb_comprehensive_tests
          rebar3 eunit --module=barrel_vectordb_backend_tests
          rebar3 eunit --module=barrel_vectordb_index_tests
          rebar3 eunit --module=barrel_vectordb_distance_tests
          rebar3 eunit --module=barrel_vectordb_pq_tests
          rebar3 eunit --module=barrel_vectordb_diskann_tests
          rebar3 eunit --module=barrel_vectordb_diskann_file_tests
          rebar3 eunit --module=barrel_vectordb_library_tests
          # BM25 tests
          rebar3 eunit --module=barrel_vectordb_bm25_tests
          rebar3 eunit --module=barrel_vectordb_bm25_disk_tests
          rebar3 eunit --module=barrel_vectordb_bm25_disk_file_tests
          rebar3 eunit --module=barrel_vectordb_bm25_formula_tests
          rebar3 eunit --module=barrel_vectordb_bm25_corpus_tests
          # TurboQuant tests
          rebar3 eunit --module=barrel_vectordb_turboquant_tests
          rebar3 eunit --module=barrel_vectordb_turboquant_subspace_tests

      - name: Coverage
        run: rebar3 cover --verbose

  dialyzer:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/barrel_vectordb/barrel_vectordb

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake libsnappy-dev liblz4-dev libzstd-dev python3-dev

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: dialyzer-${{ hashFiles('rebar.lock') }}

      - name: Dialyzer
        run: rebar3 dialyzer
