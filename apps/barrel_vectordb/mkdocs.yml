site_name: Barrel VectorDB
site_description: Embeddable vector database with HNSW indexing and semantic search
site_url: https://docs.barrel-db.eu/vectordb
repo_url: https://github.com/barrel-db/barrel_vectordb
repo_name: barrel-db/barrel_vectordb
edit_uri: edit/main/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started.md
    - Embedding Models: embeddings.md
  - Guides:
    - Features: features.md
    - TurboQuant: guides/turboquant.md
    - BM25 Text Search: bm25-disk.md
  - Internals:
    - TurboQuant Internals: internals/turboquant.md
  - Erlang API: api/erlang.md
  - Development:
    - Contributing: development/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/barrel-db/barrel_vectordb
  generator: false
